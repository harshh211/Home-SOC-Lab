# Splunk Universal Forwarder - inputs.conf
# Location: C:\Program Files\SplunkUniversalForwarder\etc\system\local\inputs.conf
# Purpose: Tells the forwarder which Windows Event Logs to collect
# Both log sources are required for the detections in this lab

# Windows Security Log
# Contains: Event ID 4625 (Failed Logon), 4688 (Process Creation), 4624 (Logon)
[WinEventLog://Security]
disabled = false
index = main

# PowerShell Operational Log
# Contains: Script Block Logging (decoded PowerShell commands)
# Critical for detecting encoded/obfuscated PowerShell execution
[WinEventLog://Microsoft-Windows-PowerShell/Operational]
disabled = false
index = main

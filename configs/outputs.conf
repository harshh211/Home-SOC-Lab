# Splunk Universal Forwarder - outputs.conf
# Location: C:\Program Files\SplunkUniversalForwarder\etc\system\local\outputs.conf
# Purpose: Tells the forwarder where to send collected logs
# Replace <SPLUNK-HOST-IP> with your Splunk server's IP address

[tcpout]
defaultGroup = default-autolb-group

[tcpout:default-autolb-group]
server = <SPLUNK-HOST-IP>:9997

[tcpout-server://<SPLUNK-HOST-IP>:9997]
